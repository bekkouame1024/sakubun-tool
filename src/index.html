<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="作文ツール">
  <meta property="og:title" content="作文ツール">
  <meta property="og:description" content="作文ツール">
  <link rel="stylesheet" href="style.css">
  <title>作文ツール</title>
</head>
<body>
  <main>
    <div id="settings-page">
      <h1>作文ツール</h1>
      
      <div class="setting">
        <label>縦</label>
        <input id="paper-row" type="number" class="input">
      </div>

      <div class="setting">
        <label>横</label>
        <input id="paper-column" type="number" class="input">
      </div>

      <div class="setting">
        <label>向き</label>
        <select id="paper-direction" class="select">
          <option value="horizontal">横書き</option>
          <option value="vertical">縦書き</option>
        </select>
      </div>

      <button onclick="setup()" class="button">作成</button>
    </div>

    <div id="main-page">
      <textarea id="textarea" class="textarea"></textarea>

      <div id="paper-wrapper">
        <div id="paper-container"></div>
      </div>
    </div>
  </main>

  <script src="./js/script.js"></script>
</body>
</html>
